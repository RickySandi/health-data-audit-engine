version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    platform: linux/amd64
    container_name: healthcare_pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hackathon_secret
      POSTGRES_DB: health_data
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - healthcare-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_data"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: healthcare_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:hackathon_secret@db:5432/health_data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - healthcare-net

  frontend:
    build:
      context: ./frontend
    container_name: healthcare_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - healthcare-net

volumes:
  postgres_data:

networks:
  healthcare-net:
    driver: bridge
