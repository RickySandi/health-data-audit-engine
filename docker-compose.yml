version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    platform: linux/amd64
    container_name: healthcare_pgvector
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - healthcare-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: healthcare_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - healthcare-net

  frontend:
    build:
      context: ./frontend
    container_name: healthcare_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - healthcare-net

volumes:
  postgres_data:

networks:
  healthcare-net:
    driver: bridge
