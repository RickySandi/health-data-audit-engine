<div class="min-h-screen flex bg-med-gray">
  <!-- Sidebar Navigation -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm hidden md:flex">
    <div class="h-16 flex items-center px-6 border-b border-gray-200">
      <div class="text-med-blue font-bold text-xl tracking-wide flex items-center gap-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
        </svg>
        DataMap Pro
      </div>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a routerLink="/dashboard" routerLinkActive="bg-blue-50 text-med-blue font-semibold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-3 py-2 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
        <svg class="w-5 h-5 text-current" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        Dashboard
      </a>
      <a routerLink="/mapper" routerLinkActive="bg-blue-50 text-med-blue font-semibold" class="flex items-center gap-3 px-3 py-2 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
        <svg class="w-5 h-5 text-current" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
        Data Mapper
      </a>
      <a routerLink="/logs" routerLinkActive="bg-blue-50 text-med-blue font-semibold" class="flex items-center gap-3 px-3 py-2 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
        <svg class="w-5 h-5 text-current" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
        System Logs
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-6 z-10 shrink-0">
      <div class="flex items-center gap-4">
        <!-- Institution Badge -->
        <div class="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-200 text-sm font-medium text-gray-700">
          <svg class="w-4 h-4 text-med-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
          Stadtspital Zürich
        </div>
      </div>
      <div class="flex items-center gap-4">
        <!-- User Avatar Placeholder -->
        <button class="w-8 h-8 rounded-full bg-med-blue text-white flex items-center justify-center font-semibold text-sm shadow-sm ring-2 ring-white hover:opacity-80 transition-opacity">
          MD
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <div class="flex-1 overflow-auto p-6 md:p-8 relative">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
